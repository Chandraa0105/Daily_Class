<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div
        {
            height: 50px;
            width: 200px;
            margin:10px auto;
            border: 1px solid;
            text-align:center;
            background: blueviolet;
            color: aliceblue;
        }

        #one
        {
            transform:rotate(30deg) ; /* rotate*/
        }

        #two
        {
            transform: scale(2);    /* scale*/
        }
        #three
        {
            transform: translatex(200px);    /* translate*/
        }

        #four
        {
            transform: skew(45deg);    /* skew*/
        }

        #five
        {
            transform: rotate(60deg) translate(200px);  /* multiple properties
            */
        }
    </style>
</head>
<body>
    <section>
        <div id="one">1</div>
        <div id="two">2</div>
        <div id='three'>3</div>
        <div id="four">4</div>
        <div id="five">5</div>
    </section>
    
</body>
</html>
