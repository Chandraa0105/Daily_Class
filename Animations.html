<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mainBox
        {
            
            margin:auto;
            height: 30px;
            width: 300px;
            background-color: blueviolet;
            border: 1px solid black;
            animation-name:Nice;
            animation-duration: 4s;
            animation-timing-function: ease-in;
            animation-iteration-count: infinite;
            animation-delay:0s;
        }
        @keyframes Nice {
            from
            {
                width:0px;
                text-align: center;

            }
            to
            {
                width: 400px;
                border-radius: 50px;
                text-align: center;
                background-color:yellow;
            }
            
        }
    </style>
</head>
<body>
    <div class="mainBox">

        Hi guys.....
    </div>
    
</body>
</html>
