        h1~h3{                                  /* sibling selector*/
            background-color: chartreuse;
        }

         h1+ h2{                              /*  adjacent sibling selector*/
            background-color:red;
        }

        input[required]
        {                                        /*  atribute selector selector*/
            border: 2px solid blue;            
        }


    </style>
</head>
<body>

    <div>
        
        <h1>h1 is sibling  div</h1>
        <h2> h2 is sibling of h1</h2>
        <h3>iddhioshdi</h3>
        <h3>lwehfoiwehi</h3>


    </div>

    <p>p is a sibling of div</p>

    <form action="">
        <label for="">FirstName</label>
        <input type="text" required>

    </form>
    
</body>
