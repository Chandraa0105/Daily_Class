<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Card</title>

<style>

body{
    background-color: gray;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    
}

section{
    width:300px;
    border:1px solid black;
    border-radius:20px;
    overflow:hidden;
    margin:auto;
    background-color:white;
    box-shadow: 0px 4px 10px yellow;
    
}

.image_container img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
    
}

.info_container{
    padding:15px;
    background-color:beige;
    
}

.info_container h1{
    margin:0;
    font-size:28px;
    background-color:transparent;
}

.info_container p{
    font-size:16px;
    line-height:22px;
    background-color:transparent;
}

.tags{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:15px;
}

.tags span{
    background-color:burlywood;
    padding:5px;
    border-radius:5px;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.buttons button{
    width:120px;
    padding:10px;
    border-radius:10px;
    border:1px solid black;
    font-weight:bold;
    cursor:pointer;
}

.code{
    background-color:orange;
}

.ratings{
    background-color:lightgreen;
}
.num
{
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background-color: black;
    border-radius: 50%;
    padding: 3px;
    font-size: 10 px;
    
    
}
.image_container
{
    position: relative  ;
}


.card:hover
{
    transform: translateY(-10px);
}
</style>

</head>

<body>

<section class="card">

    <div class="image_container">
        <img src="curd_rice_img.jpg" alt="Curd Rice">
        <span class="num">01</span>
    </div>

    <div class="info_container">

        <h1>Food Delivery System</h1>

        <p>
            Curd rice is good for health. Try to eat it during summer.
            Many people choose curd rice for breakfast.
        </p>

        <div class="tags">
            <span>Healthy</span>
            <span>Rice</span>
            <span>Summer</span>
            <span>Breakfast</span>
        </div>

        <div class="buttons">
            <button class="code">Order</button>
            <button class="ratings">Ratings</button>
        </div>

    </div>

</section>

</body>
</html>
